<!DOCTYPE html>
<html>
<head>
    <title>CS2 WebVR - Red Infinity</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* Giriş Ekranı ve UI Tasarımı */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 2s ease-in-out;
        }
        #infinity-logo {
            font-size: 100px; color: #ff0000; text-shadow: 0 0 20px #ff0000;
            animation: pulse 2s infinite; cursor: pointer;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        #game-ui {
            position: fixed; bottom: 20px; left: 20px; color: white;
            font-family: 'Courier New', monospace; z-index: 100; pointer-events: none;
        }
        #buy-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8); padding: 20px; border: 2px solid #ff0000;
            display: none; color: white; text-align: center; z-index: 200;
        }
        button { background: #333; color: white; border: 1px solid #ff0000; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="infinity-logo" onclick="startGame()">∞</div>
        <p style="color: white; margin-top: 20px;">BAŞLAMAK İÇİN TIKLA</p>
    </div>

    <div id="game-ui">
        <h2>PARA: $<span id="money">800</span></h2>
        <h3>CAN: 100</h3>
    </div>

    <div id="buy-menu">
        <h1>MARKET (B)</h1>
        <button onclick="buyWeapon('AK-47', 2700)">AK-47 ($2700)</button>
        <button onclick="buyWeapon('AWP', 4750)">AWP ($4750)</button>
        <button onclick="closeBuyMenu()">KAPAT</button>
    </div>

    <a-scene physics="debug: false">
        <a-assets>
            </a-assets>

        <a-entity id="map-container">
            <a-plane rotation="-90 0 0" width="100" height="100" color="#222"></a-plane>
            <a-box position="0 2 -10" color="#ff0000" scale="2 4 2"></a-box> </a-entity>

        <a-entity id="player" position="0 1.6 0">
            <a-camera id="cam" look-controls wasd-controls>
                <a-cursor color="red"></a-cursor>
            </a-camera>
            <a-entity laser-controls="hand: right"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        let money = 800;

        // Başlangıç Animasyonu
        function startGame() {
            const screen = document.getElementById('loading-screen');
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; }, 2000);
        }

        // Market Sistemi (B Tuşu)
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'b') {
                document.getElementById('buy-menu').style.display = 'block';
                document.exitPointerLock(); // Mouse'u serbest bırak
            }
        });

        function closeBuyMenu() {
            document.getElementById('buy-menu').style.display = 'none';
        }

        function buyWeapon(name, price) {
            if (money >= price) {
                money -= price;
                document.getElementById('money').innerText = money;
                alert(name + " ALINDI!");
                closeBuyMenu();
            } else {
                alert("PARA YETERSİZ!");
            }
        }

        // Bot ve Çatışma Mantığı (Basit)
        document.querySelector('a-scene').addEventListener('click', () => {
            // Mermi sesi ve bot vurma logicleri buraya
            console.log("Ateşlendi!");
        });
    </script>
</body>
</html>
