<!DOCTYPE html>
<html>
<head>
    <title>CS2 WebVR - Red Infinity</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out;
        }
        #infinity-logo {
            font-size: 120px; color: #ff0000; text-shadow: 0 0 30px #ff0000;
            animation: pulse 2s infinite; cursor: pointer; user-select: none;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        #game-ui {
            position: fixed; bottom: 20px; left: 20px; color: #00ff00;
            font-family: 'Arial', sans-serif; z-index: 100; text-shadow: 2px 2px black;
        }
        #buy-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9); padding: 30px; border: 3px solid #ff0000;
            display: none; color: white; text-align: center; z-index: 200; border-radius: 15px;
        }
        button { background: #444; color: white; border: 1px solid #ff0000; padding: 10px 20px; margin: 5px; cursor: pointer; }
        button:hover { background: #ff0000; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="infinity-logo" onclick="startGame()">∞</div>
        <p style="color: #555; letter-spacing: 5px;">RED INFINITY</p>
    </div>

    <div id="game-ui">
        <h1 style="margin:0;">$ <span id="money">800</span></h1>
        <p>HEALTH: 100</p>
    </div>

    <div id="buy-menu">
        <h2 style="color: #ff0000;">EQUIPMENT</h2>
        <button onclick="buyWeapon('AK-47', 2700)">AK-47 ($2700)</button><br>
        <button onclick="buyWeapon('AWP', 4750)">AWP ($4750)</button><br>
        <button onclick="buyWeapon('DEAGLE', 700)">DEAGLE ($700)</button><br><br>
        <button onclick="closeBuyMenu()" style="border-color: white;">CLOSE (B)</button>
    </div>

    <a-scene>
        <a-sky color="#111"></a-sky>
        <a-plane rotation="-90 0 0" width="100" height="100" color="#1a1a1a"></a-plane>

        <a-box id="enemy-bot" position="0 1.5 -10" color="#ff0000" 
               animation="property: position; to: 5 1.5 -10; dir: alternate; dur: 2000; loop: true"
               class="target">
            <a-text value="ENEMY" align="center" position="0 1.2 0" scale="0.8 0.8 0.8"></a-text>
        </a-box>

        <a-entity id="rig" position="0 0 0">
            <a-camera id="cam" look-controls wasd-controls>
                <a-cursor color="red" scale="0.5 0.5 0.5"></a-cursor>
                
                <a-entity id="weapon-model" position="0.5 -0.4 -0.6" rotation="0 -90 0">
                    <a-box width="0.4" height="0.1" depth="0.1" color="#333"></a-box>
                    <a-box width="0.1" height="0.2" depth="0.08" color="#222" position="-0.15 -0.1 0"></a-box>
                </a-entity>
            </a-camera>
        </a-entity>
    </a-scene>

    <script>
        let money = 800;

        function startGame() {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 1500);
        }

        // B tuşu ile marketi aç/kapat
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'b') {
                const menu = document.getElementById('buy-menu');
                menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
            }
        });

        function closeBuyMenu() { document.getElementById('buy-menu').style.display = 'none'; }

        function buyWeapon(name, price) {
            if (money >= price) {
                money -= price;
                updateMoney();
                alert(name + " alındı! Bol şans asker.");
                closeBuyMenu();
            } else {
                alert("Yetersiz bakiye!");
            }
        }

        function updateMoney() {
            document.getElementById('money').innerText = money;
        }

        // ATEŞ ETME VE PARA KAZANMA
        document.querySelector('a-scene').addEventListener('mousedown', function (evt) {
            // Silah tepme animasyonu (Hafif geri gitme)
            const weapon = document.getElementById('weapon-model');
            weapon.setAttribute('animation', 'property: position; to: 0.5 -0.4 -0.5; dur: 50; dir: alternate; loop: 1');

            // Hedefi vurup vurmadığını kontrol et
            const cursor = document.querySelector('a-cursor');
            let intersection = cursor.components.raycaster.getIntersection(document.getElementById('enemy-bot'));
            
            if (intersection) {
                console.log("BOT VURULDU!");
                money += 300; // Adam vurunca 300$ gelsin
                updateMoney();
                
                // Botu geçici olarak gizle (Ölme efekti)
                const bot = document.getElementById('enemy-bot');
                bot.setAttribute('visible', 'false');
                setTimeout(() => { 
                    bot.setAttribute('position', `${Math.random()*10 - 5} 1.5 -10`); 
                    bot.setAttribute('visible', 'true'); 
                }, 1000);
            }
        });
    </script>
</body>
</html>
